[build]
  publish = "."

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# URL parity with the source site (and their existing indexed links)
[[redirects]]
  from = "/nmf-rally"
  to = "/nmf-rally.html"
  status = 200

[[redirects]]
  from = "/nmfsmokeshow"
  to = "/nmfsmokeshow.html"
  status = 200

[[redirects]]
  from = "/nmf3"
  to = "/nmf3.html"
  status = 200

[[redirects]]
  from = "/nmfteam"
  to = "/nmfteam.html"
  status = 200

[[redirects]]
  from = "/contact-us"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/home-493451"
  to = "/index.html"
  status = 301
